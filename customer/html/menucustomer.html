<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Menu</title>

    <link rel="icon" type="image/png" href="/src/IMG/Logo.png">

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your Custom Styles -->
  <link rel="stylesheet" href="../css/menu.css">
  
  </head>
  <body>
    <!-- Header -->
    <header class="menu-header">
      <div class="container-fluid">
        <div class="row align-items-center">
          <div class="col-lg-3 col-md-4 col-6">
            <a href="/index.html" class="back-to-menu" id="back-btn">
              <i class="fas fa-arrow-left"></i>
              <span>MENU</span>
            </a>
          </div>
          <div class="col-lg-9 col-md-8 col-6">
            <div class="header-right-content">
              <nav class="main-nav d-none d-lg-flex">
                <ul class="nav-list">
                  <li><a href="/index.html" class="nav-link">Home</a></li>
                  <li><a href="#" class="nav-link active">Menu</a></li>
                </ul>
              </nav>
              <div class="header-actions">
                 <div class="search-bar">
              <input type="text" placeholder="Search" class="search-input">
              <img class="search-img" src="/src/Icons/search.png" alt="Search Icon">
                </div>
              <div class="header-icons">
              <a href="html/login.html" class="icon-link">
                <img class="user-img" src="/src/Icons/user (1).png" alt="User Icon">
              </a>
              <a href="#" class="icon-link">
                <img class="bag-img" src="/src/Icons/bag (1).png" alt="Shopping Bag Icon">
              </a>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="menu-page container-fluid">
      <div class="row">
        <!-- Left: Menu Items -->
        <div class="col-lg-8">
          <div class="menu-categories">
            <!-- Categories will be loaded dynamically from Firebase -->
            <div class="category-links-container">
              <div class="spinner-border spinner-border-sm text-primary me-2" role="status">
                <span class="visually-hidden">Loading...</span>
              </div>
              <span class="text-muted">Loading categories...</span>
            </div>
          </div>

          <div class="row menu-items-grid g-4">
            <!-- Menu items will be loaded dynamically from Firebase -->
            <div class="col-12 text-center py-5">
              <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
              </div>
              <p class="mt-3 text-muted">Loading menu items...</p>
            </div>
          </div>
        </div>

        <!-- Right: Order Summary -->
        <div class="col-lg-4">
          <div class="order-summary custom-order-summary">
            <div class="address-section">
              <h5>Your Address</h5>
              <div class="address-details">
                <img src = "/src/Icons/stroke.png" alt="Location Icon" class="location-icon">
                <div class="address-text">
                  <span class="address-name">John Doe Adress</span>
                  <button class="change-btn">Change</button>
                  <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
                </div>
              </div>
            </div>
            <div class="order-menu">
              <h5>Order Menu</h5>
              <div class="order-item">
                <span>1</span>
                <span>Crispy Kare-Kare</span>
                <span class="order-item-price">Php 500</span>
              </div>
            </div>
            <hr style="margin: 30px 0 10px 0;">
            <div class="order-total">
              <span>Total</span>
              <span class="order-total-price" style="color:#e5735a">Php 500</span>
            </div>
            <button class="proceed-btn">Proceed</button>
          </div>
        </div>
      </div>
    </main>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <!-- Firebase Config -->
    <script src="../firebase-config.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Menu JavaScript -->
    <script src="../javascript/menu.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const backBtn = document.getElementById('back-btn');
        if (backBtn) {
          backBtn.addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = '/index.html';
          });
        }
      });
    </script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const checkoutBtn = document.querySelector('.checkout-btn');
        if (checkoutBtn) {
          checkoutBtn.addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = '/customer/html/details.html';
          });
        }
      });
    </script>
  </body>
</html>

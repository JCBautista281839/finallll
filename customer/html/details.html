<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <link rel="stylesheet" href="../css/details.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <!-- Back button -->
    <div class="top-nav">
      <a href="menucustomer.html" class="back-btn">← BACK</a>
      <div class="nav-links">
        <a href="#">Home</a>
        <a href="menucustomer.html" class="active">Menu</a>
        <div class="search-box">
          <input type="text" placeholder="Search">
          <span class="search-icon">🔍</span>
        </div>
        <span class="icon">👤</span>
        <span class="icon">🛒</span>
      </div>
    </div>

    <!-- Checkout form and order summary -->
    <div class="checkout">
      <!-- Contact and Shipping Details -->
      <div class="form-section">
        <h2 class="form-title">ENTER YOUR CONTACT AND SHIPPING DETAILS</h2>

        <h3>Contact Information</h3>
        <div class="row">
          <div class="col">
            <label>Email Address *</label>
            <input type="email" id="email" placeholder="Enter your email" required>
          </div>
          <div class="col">
            <label>Phone Number *</label>
            <input type="tel" id="phone" placeholder="Enter your phone number" required>
          </div>
        </div>

        <h3>Shipping Address</h3>
        <div class="row">
          <div class="col">
            <label>First Name *</label>
            <input type="text" id="firstName" required>
          </div>
          <div class="col">
            <label>Last Name *</label>
            <input type="text" id="lastName" required>
          </div>
        </div>

        <label>Address *</label>
        <input type="text" id="address" required>

        <div class="row">
          <div class="col">
            <label>Barangay *</label>
            <input type="text" id="barangay" required>
          </div>
          <div class="col">
            <label>Postal Code *</label>
            <input type="text" id="postalCode" required>
          </div>
        </div>

        <div class="row">
          <div class="col">
            <label>City / Municipality *</label>
            <input type="text" id="city" required>
          </div>
          <div class="col">
            <label>Province *</label>
            <input type="text" id="province" required>
          </div>
        </div>
      </div>

      <!-- Order Summary -->
      <div class="order-summary">
        <h2>ORDER SUMMARY</h2>
        <div class="order-menu" id="order-menu">
          <!-- Cart items will be loaded dynamically -->
        </div>
        <hr>
        <div class="total">
          <span>Total</span>
          <span class="price" id="total-price">Php 0</span>
        </div>
        <!-- Checkout page continue button -->
        <button class="continue-btn" onclick="window.location.href='shipping.html'">
          Continue
        </button>
      </div>
    </div>

    <!-- Location Confirmation -->
  <div class="location-section">
    <h3>Location Confirmation</h3>
      <p>Pin and confirm your address below</p>

    <input id="address-input" type="text" placeholder="Enter your address" style="width:100%;padding:10px;margin-bottom:10px;">
    <div id="coords-result" style="margin-top:10px; font-weight:600;"></div>

    <!-- Map Container -->
    <div class="map-box">
      <div id="map"></div>
    </div>
  </div>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAgyZCnALMDNkeu69WlpvuilTRrggoth_s&libraries=places"></script>
  <script src="../javascript/maps.js"></script>
  <script src="../javascript/details.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Load cart data from sessionStorage (matching cart.js format)
      const cartData = JSON.parse(sessionStorage.getItem('cartData')) || {};
      const cartItems = Object.values(cartData);
      
      // Update order summary with cart items
      updateOrderSummary();
      
      function updateOrderSummary() {
        const orderMenuDiv = document.getElementById('order-menu');
        const totalPriceDiv = document.getElementById('total-price');
        
        if (cartItems.length === 0) {
          orderMenuDiv.innerHTML = `
            <div class="order-item">
              <span>1</span>
              <span>Crispy Kare-Kare</span>
              <span class="price">Php 500</span>
            </div>
          `;
          totalPriceDiv.textContent = 'Php 500';
        } else {
          let orderItemsHTML = '';
          let total = 0;
          
          cartItems.forEach(item => {
            const price = parseFloat(item.price.replace(/[^\d.]/g, ''));
            const itemTotal = price * item.quantity;
            total += itemTotal;
            orderItemsHTML += `
              <div class="order-item">
                <span>${item.quantity}</span>
                <span>${item.name}</span>
                <span class="price">Php ${itemTotal.toFixed(0)}</span>
              </div>
            `;
          });
          
          orderMenuDiv.innerHTML = orderItemsHTML;
          totalPriceDiv.textContent = `Php ${total.toFixed(0)}`;
        }
      }
    });
  </script>
  
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Victoria's Bistro - Customer Login</title>

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your Custom CSS -->
    <link rel="stylesheet" href="/customer/css/nav.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div class="mobile-container">
        <!-- Login Section -->
        <div class="login-section">
            <div class="back-arrow" onclick="window.location.href='/'">
                <i class="fas fa-arrow-left"></i>
            </div>

            <div class="login-form">
                <h1 class="welcome-title">WELCOME BACK!</h1>
                <p class="welcome-subtitle">Sign in to your customer account.</p>

                <form id="customerLoginForm">
                    <input type="email" class="form-input" id="customerEmail" placeholder="Email Address" required>
                    
                    <div class="password-container">
                        <input type="password" class="form-input" id="customerPassword" placeholder="Password" required>
                        <i class="fas fa-eye password-toggle" onclick="togglePassword('customerPassword')"></i>
                    </div>
                    
                    <div id="loginError" class="error-message" style="display: none;"></div>
                    
                    <button type="submit" class="login-btn">Sign In</button>
                </form>
                
                <div class="no-account">
                    Don't have an account? <a href="/html/signup.html">Sign Up</a>
                </div>
                
                <div class="forgot-password">
                    <a href="#" onclick="showForgotPassword()">Forgot Password?</a>
                </div>
            </div>
        </div>

        <!-- Photo Section -->
        <div class="photo-section">
            <div class="photo-item">
                <img src="/src/IMG/viktoriaslogin.png" alt="Customer Login Image">
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/main.js"></script>
    
    <script>
        // Customer login functionality
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('customerLoginForm');
            const emailInput = document.getElementById('customerEmail');
            const passwordInput = document.getElementById('customerPassword');
            const errorDiv = document.getElementById('loginError');

            // Password toggle functionality
            window.togglePassword = function(inputId) {
                const passwordInput = document.getElementById(inputId);
                const toggleIcon = passwordInput.nextElementSibling;
                
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    toggleIcon.classList.remove('fa-eye');
                    toggleIcon.classList.add('fa-eye-slash');
                } else {
                    passwordInput.type = 'password';
                    toggleIcon.classList.remove('fa-eye-slash');
                    toggleIcon.classList.add('fa-eye');
                }
            }

            // Forgot password functionality
            window.showForgotPassword = function() {
                const email = emailInput.value.trim();
                if (!email) {
                    alert('Please enter your email address first.');
                    emailInput.focus();
                    return;
                }

                firebase.auth().sendPasswordResetEmail(email)
                    .then(() => {
                        alert('Password reset email sent! Please check your inbox.');
                    })
                    .catch((error) => {
                        alert('Error sending password reset email: ' + error.message);
                    });
            }

            // Login form submission
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const email = emailInput.value.trim();
                const password = passwordInput.value;

                // Clear previous errors
                errorDiv.style.display = 'none';
                errorDiv.textContent = '';

                if (!email || !password) {
                    showError('Please enter both email and password.');
                    return;
                }

                // Show loading state
                const submitBtn = loginForm.querySelector('.login-btn');
                const originalText = submitBtn.textContent;
                submitBtn.textContent = 'Signing In...';
                submitBtn.disabled = true;

                // Sign in with Firebase
                firebase.auth().signInWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        // Check if user is a customer
                        return firebase.firestore().collection('users').doc(userCredential.user.uid).get();
                    })
                    .then((userDoc) => {
                        if (userDoc.exists) {
                            const userData = userDoc.data();
                            if (userData.role === 'customer') {
                                // Redirect to customer menu
                                window.location.href = '/customer/html/menu.html';
                            } else {
                                // Not a customer, sign out and show error
                                firebase.auth().signOut();
                                showError('This account is not authorized for customer access.');
                            }
                        } else {
                            showError('User account not found.');
                        }
                    })
                    .catch((error) => {
                        console.error('Login error:', error);
                        let errorMessage = 'Login failed. ';
                        
                        switch (error.code) {
                            case 'auth/user-not-found':
                            case 'auth/invalid-email':
                                errorMessage += 'No account found with this email address.';
                                break;
                            case 'auth/wrong-password':
                                errorMessage += 'Incorrect password.';
                                break;
                            case 'auth/too-many-requests':
                                errorMessage += 'Too many failed attempts. Please try again later.';
                                break;
                            case 'auth/user-disabled':
                                errorMessage += 'This account has been disabled.';
                                break;
                            default:
                                errorMessage += error.message || 'An unexpected error occurred.';
                        }
                        
                        showError(errorMessage);
                    })
                    .finally(() => {
                        // Reset button state
                        submitBtn.textContent = originalText;
                        submitBtn.disabled = false;
                    });
            });

            function showError(message) {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>

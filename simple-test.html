<!DOCTYPE html>
<html>
<head>
    <title>Simple OTP Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        button { padding: 10px 20px; margin: 10px; font-size: 16px; }
        .result { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Simple OTP Test</h1>
    
    <button onclick="testServer()">Test Server Connection</button>
    <button onclick="testSendOTP()">Test Send OTP</button>
    <button onclick="testVerifyOTP()">Test Verify OTP</button>
    
    <div id="result" class="result"></div>

    <script>
        function showResult(message) {
            document.getElementById('result').innerHTML = message;
        }

        async function testServer() {
            try {
                showResult('Testing server connection...');
                const response = await fetch('http://localhost:5001/api/test');
                const data = await response.json();
                showResult('✅ Server working: ' + JSON.stringify(data));
            } catch (error) {
                showResult('❌ Server error: ' + error.message);
            }
        }

        async function testSendOTP() {
            try {
                showResult('Testing generate OTP...');
                const response = await fetch('http://localhost:5001/api/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: 'test@example.com', userName: 'Test User' })
                });
                
                const text = await response.text();
                showResult('✅ Generate OTP Response: ' + text);
            } catch (error) {
                showResult('❌ Generate OTP error: ' + error.message);
            }
        }

        async function testVerifyOTP() {
            try {
                showResult('Testing verify OTP...');
                const response = await fetch('http://localhost:5001/api/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: 'test@example.com', otp: '332941' })
                });
                
                const text = await response.text();
                showResult('✅ Verify OTP Response: ' + text);
            } catch (error) {
                showResult('❌ Verify OTP error: ' + error.message);
            }
        }
    </script>
</body>
</html>

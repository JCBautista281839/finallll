<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Victoria's Bistro - Create Account</title>

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your Custom CSS -->
    <link rel="stylesheet" href="/css/signup.css">
</head>
<body>
    <div class="mobile-container">
        <!-- Create Account Section -->
        <div class="login-section">
            <div class="back-arrow" onclick="window.location.href='login.html'">
                <i class="fas fa-arrow-left"></i>
            </div>

            <div class="login-form">
                <h1 class="welcome-title">WELCOME KA VIKTORIAS!</h1>
                <p class="welcome-subtitle">Let's create an account.</p>

                <form>
                    <input type="text" class="form-input" placeholder="Name" required>
                    <input type="email" class="form-input" placeholder="Email Address" required>
                    
                    <div class="password-container">
                        <input type="password" class="form-input" id="password" placeholder="Create a Password" required>
                        <i class="fas fa-eye password-toggle" onclick="togglePassword('password')"></i>
                    </div>
                    
                    <div class="password-requirements">
                        Must be at least 8 characters.<br>
                        Must contain a number and a symbol.
                    </div>
                    
                    <div class="terms-checkbox">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">
                            By continuing, you agree to our updated 
                            <a href="#">Terms and Conditions</a> and 
                            <a href="#">Privacy Policy</a>.
                        </label>
                    </div>
                    
                    <button type="submit" class="login-btn">Continue</button>
                </form>
                
                <div class="no-account">
                    Already have an account? <a href="/html/login.html">Login</a>
                </div>
            </div>
        </div>

        <!-- Photo Section -->
        <div class="photo-section">
            <div class="photo-item">
                <!-- Replace with your create account image -->
                <img src="/src/IMG/viktoriaslogin.png" alt="Create Account Image">
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        function togglePassword(inputId) {
            const passwordInput = document.getElementById(inputId);
            const toggleIcon = passwordInput.nextElementSibling;
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // Real-time validation and button state management
        document.addEventListener('DOMContentLoaded', function() {
            const nameInput = document.querySelector('input[placeholder="Name"]');
            const emailInput = document.querySelector('input[placeholder="Email Address"]');
            const passwordInput = document.getElementById('password');
            const termsCheckbox = document.getElementById('terms');
            const continueBtn = document.querySelector('.login-btn');
            const passwordRequirements = document.querySelector('.password-requirements');

            // Initially disable the button
            updateButtonState();

            // Add event listeners for real-time validation
            nameInput.addEventListener('input', updateButtonState);
            emailInput.addEventListener('input', updateButtonState);
            passwordInput.addEventListener('input', function() {
                updatePasswordRequirements();
                updateButtonState();
            });
            termsCheckbox.addEventListener('change', updateButtonState);

            function updatePasswordRequirements() {
                const password = passwordInput.value;
                const hasMinLength = password.length >= 8;
                const hasNumber = /\d/.test(password);
                const hasSymbol = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password);

                let requirementsText = '';
                
                if (!hasMinLength) {
                    requirementsText += '<span style="color: #dc3545;">✗ Must be at least 8 characters.</span><br>';
                } else {
                    requirementsText += '<span style="color: #28a745;">✓ Must be at least 8 characters.</span><br>';
                }

                if (!hasNumber) {
                    requirementsText += '<span style="color: #dc3545;">✗ Must contain a number.</span><br>';
                } else {
                    requirementsText += '<span style="color: #28a745;">✓ Must contain a number.</span><br>';
                }

                if (!hasSymbol) {
                    requirementsText += '<span style="color: #dc3545;">✗ Must contain a symbol.</span>';
                } else {
                    requirementsText += '<span style="color: #28a745;">✓ Must contain a symbol.</span>';
                }

                passwordRequirements.innerHTML = requirementsText;
            }

            function updateButtonState() {
                const name = nameInput.value.trim();
                const email = emailInput.value.trim();
                const password = passwordInput.value;
                const termsChecked = termsCheckbox.checked;

                // Validate all requirements
                const nameValid = name.length > 0;
                const emailValid = isValidEmail(email);
                const passwordValid = validatePassword(password);
                const termsValid = termsChecked;

                const allValid = nameValid && emailValid && passwordValid && termsValid;

                if (allValid) {
                    continueBtn.disabled = false;
                    continueBtn.style.opacity = '1';
                    continueBtn.style.cursor = 'pointer';
                    continueBtn.style.backgroundColor = '#8B2E20';
                } else {
                    continueBtn.disabled = true;
                    continueBtn.style.opacity = '0.6';
                    continueBtn.style.cursor = 'not-allowed';
                    continueBtn.style.backgroundColor = '#ccc';
                }
            }

            function isValidEmail(email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
            }

            function validatePassword(password) {
                const hasMinLength = password.length >= 8;
                const hasNumber = /\d/.test(password);
                const hasSymbol = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password);
                return hasMinLength && hasNumber && hasSymbol;
            }

            // Form submission
            document.querySelector('form').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const name = nameInput.value.trim();
                const email = emailInput.value.trim();
                const password = passwordInput.value;
                const termsChecked = termsCheckbox.checked;

                // Final validation
                if (!name) {
                    alert('Please enter your name.');
                    nameInput.focus();
                    return;
                }

                if (!isValidEmail(email)) {
                    alert('Please enter a valid email address.');
                    emailInput.focus();
                    return;
                }

                if (!validatePassword(password)) {
                    alert('Password must be at least 8 characters and contain a number and symbol.');
                    passwordInput.focus();
                    return;
                }

                if (!termsChecked) {
                    alert('Please agree to the Terms and Conditions and Privacy Policy.');
                    termsCheckbox.focus();
                    return;
                }

                // If all validations pass, redirect to email verification with email parameter
                const encodedEmail = encodeURIComponent(email);
                window.location.href = `confirmation.html?email=${encodedEmail}&name=${encodeURIComponent(name)}`;
            });
        });

        document.addEventListener('DOMContentLoaded', function() {
          var passwordInput = document.getElementById('password');
          var requirements = document.querySelector('.password-requirements');
          if (passwordInput && requirements) {
            requirements.style.display = 'none';
            passwordInput.addEventListener('focus', function() {
              requirements.style.display = 'block';
            });
            passwordInput.addEventListener('blur', function() {
              requirements.style.display = 'none';
            });
          }
        });
    </script>
</body>
</html>

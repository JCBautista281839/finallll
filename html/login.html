<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Viktoria's Bistro - Login</title>

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your Custom CSS -->
    <link rel="stylesheet" href="../css/login.css">
    
  
</head>
<body>
    <!-- Back Button -->
    <div class="back-button-container">
        <a href="/index.html" class="back-button">
            <i class="fas fa-arrow-left"></i>
        </a>
    </div>
    
    <div class="mobile-container">
        <!-- Login Section -->
        <div class="login-section">

            <div class="login-form">
                <div class="role-choice">
                    <button type="button" class="btn btn-outline-primary" id="adminBtn">Admin</button>
                    <button type="button" class="btn btn-outline-secondary" id="customerBtn">Customer</button>
                </div>
                <h1 class="welcome-title">WELCOME KA VIKTORIAS!</h1>
                <p class="welcome-subtitle">Let's get you signed in.</p>

                <form id="loginForm">
                    <input type="text" id="username" class="form-input" placeholder="Email Address or Username" required>
                    <input type="password" id="password" class="form-input" placeholder="Password" required>
                    <button type="submit" class="login-btn">Log In</button>
                    <a href="#" class="forgot-password">Forgot Password</a>
                    <p class="terms-text">
                        By continuing, you agree to our updated<br> 
                        <a href="#">Terms and Conditions</a> and 
                        <a href="#">Privacy Policy</a>.
                    </p>
                    <div id="loginError" style="display:none;color:red;margin-top:10px;"></div>
                </form>
                <div class="no-account">
                    No Account? <a href="/html/signup.html">Create An Account here.</a>
                </div>
            </div>
        </div>

        <!-- Photo Collage Section -->
        <div class="photo-section">
            <div class="photo-collage">
                <!-- REPLACE THESE src PATHS WITH YOUR LOCAL IMAGE FILES -->
                <div class="photo-item photo-1">
                    <img src="/src/IMG/viktoriaslogin.png" alt="Restaurant atmosphere">
                </div>

            </div>
        </div>
    </div>
 <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/javascript/login.js"></script>
    <script>
document.addEventListener('DOMContentLoaded', function() {
  var adminBtn = document.getElementById('adminBtn');
  var customerBtn = document.getElementById('customerBtn');
  var noAccountDiv = document.querySelector('.no-account');
  if (adminBtn) {
    adminBtn.addEventListener('click', function() {
      if (noAccountDiv) noAccountDiv.style.display = 'none';
    });
  }
  if (customerBtn) {
    customerBtn.addEventListener('click', function() {
      if (noAccountDiv) noAccountDiv.style.display = '';
    });
  }
});
</script>
</body>
</html>

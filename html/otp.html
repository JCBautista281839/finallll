<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification - Viktoria's Bistro</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/otp.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Left Column - Verification Form -->
            <div class="col-md-6 left-column">
                <button class="back-button" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i>
                </button>
                
                <div class="verification-content">
                <h1 class="main-heading">Check your phone number</h1>
                <p class="email-text">
                    We sent a code to <span class="email-address" id="phoneDisplay">+63 912 345 6789</span>
                </p>
                    
                    <div class="otp-inputs">
                        <input type="text" class="otp-input" maxlength="1" data-index="0">
                        <input type="text" class="otp-input" maxlength="1" data-index="1">
                        <input type="text" class="otp-input" maxlength="1" data-index="2">
                        <input type="text" class="otp-input" maxlength="1" data-index="3">
                        <input type="text" class="otp-input" maxlength="1" data-index="4">
                        <input type="text" class="otp-input" maxlength="1" data-index="5">
                    </div>
                    
                    <p class="resend-text">
                        Didn't get a code? <span class="resend-link" onclick="resendCode()">Click to resend.</span>
                    </p>
                    
                    <button class="signup-button" id="verifyButton" onclick="verifyOTP()" disabled>
                        Sign Up
                    </button>
                    
                    <p class="login-text">
                        Already have an account? <span class="login-link" onclick="goToLogin()">Login</span>
                    </p>
                </div>
            </div>
            
            <!-- Right Column - Photo Collage -->
            <div class="col-md-6 right-column">
                <div class="photo-collage">
                    <div class="photo-item"></div>
                    <div class="photo-item"></div>
                    <div class="photo-item"></div>
                    <div class="photo-item"></div>
                    <div class="photo-item"></div>
                    <div class="photo-item"></div>
                </div>
                <div class="pink-overlay"></div>
                <div class="overlay-text">Celebrate! at Viktoria's Bistro</div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Main Firebase Config -->
    <script src="../main.js"></script>
    
    <!-- Signup Functions for SMS OTP -->
    <script src="../javascript/signup.js"></script>
    
    <!-- Custom JavaScript -->
    <script>
        // Wait for Firebase to be ready
        function waitForFirebase() {
            return new Promise((resolve) => {
                const checkFirebase = () => {
                    if (typeof firebase !== 'undefined' && firebase.apps.length > 0) {
                        console.log('Firebase is ready in OTP page');
                        resolve();
                    } else {
                        setTimeout(checkFirebase, 100);
                    }
                };
                checkFirebase();
            });
        }
        
        // Initialize Firebase when page loads
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                // Initialize Firebase
                if (typeof initializeFirebase === 'function') {
                    initializeFirebase();
                }
                
                // Wait for Firebase to be ready
                await waitForFirebase();
                
            } catch (error) {
                console.error('Firebase initialization error:', error);
            }
        });
        
        // OTP Input Handling
        const otpInputs = document.querySelectorAll('.otp-input');
        const verifyButton = document.getElementById('verifyButton');
        
        // Auto-focus and navigation between inputs
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', function(e) {
                const value = e.target.value;
                
                // Only allow numbers
                if (!/^\d$/.test(value)) {
                    e.target.value = '';
                    return;
                }
                
                // Add filled class
                if (value) {
                    e.target.classList.add('filled');
                } else {
                    e.target.classList.remove('filled');
                }
                
                // Move to next input
                if (value && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
                
                // Check if all inputs are filled
                checkOTPComplete();
            });
            
            input.addEventListener('keydown', function(e) {
                // Handle backspace
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });
            
            input.addEventListener('paste', function(e) {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text');
                const digits = pastedData.replace(/\D/g, '').slice(0, 6);
                
                digits.split('').forEach((digit, i) => {
                    if (otpInputs[i]) {
                        otpInputs[i].value = digit;
                        otpInputs[i].classList.add('filled');
                    }
                });
                
                checkOTPComplete();
            });
        });
        
        // Check if OTP is complete
        function checkOTPComplete() {
            const allFilled = Array.from(otpInputs).every(input => input.value);
            verifyButton.disabled = !allFilled;
        }
        
        // Verify SMS OTP
        async function verifyOTP() {
            const otp = Array.from(otpInputs).map(input => input.value).join('');
            
            if (otp.length !== 6) {
                alert('Please enter the complete 6-digit code');
                return;
            }
            
            // Show loading state
            verifyButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
            verifyButton.disabled = true;
            
            try {
                // Wait for Firebase to be ready
                await waitForFirebase();
                
                if (typeof firebase === 'undefined') {
                    throw new Error('Firebase not loaded. Please refresh the page and try again.');
                }
                
                // Get current user
                const user = firebase.auth().currentUser;
                if (!user) {
                    throw new Error('No user found. Please sign up again.');
                }
                
                console.log('Verifying SMS OTP for user:', user.email);
                
                // Verify SMS OTP
                const storedOTP = localStorage.getItem('smsOTP');
                const otpExpiry = localStorage.getItem('smsOTPExpiry');
                
                if (!storedOTP || !otpExpiry) {
                    throw new Error('No OTP found. Please request a new code.');
                }
                
                // Check if OTP has expired
                if (Date.now() > parseInt(otpExpiry)) {
                    localStorage.removeItem('smsOTP');
                    localStorage.removeItem('smsOTPExpiry');
                    throw new Error('OTP has expired. Please request a new code.');
                }
                
                // Verify OTP
                if (otp !== storedOTP) {
                    throw new Error('Invalid verification code. Please try again.');
                }
                
                console.log('SMS OTP verified successfully');
                
                // Update user's phone verification status in Firestore
                try {
                    await firebase.firestore().collection('customers').doc(user.uid).update({
                        'profile.phoneVerified': true,
                        'profile.phoneNumber': localStorage.getItem('signupPhone'),
                        lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (firestoreError) {
                    console.warn('Firestore update failed:', firestoreError.message);
                }
                
                // Clear stored data
                localStorage.removeItem('smsOTP');
                localStorage.removeItem('smsOTPExpiry');
                localStorage.removeItem('signupPhone');
                localStorage.removeItem('signupEmail');
                localStorage.removeItem('signupName');
                
                // Show success message
                alert('Phone number verified successfully! You can now log in.');
                
                // Redirect to login page
                window.location.href = 'html/login.html';
                
            } catch (error) {
                console.error('SMS OTP verification error:', error);
                alert('Verification failed: ' + error.message);
                
                // Reset button state
                verifyButton.innerHTML = 'Sign Up';
                verifyButton.disabled = false;
            }
        }
        
        // Resend SMS code
        async function resendCode() {
            const resendLink = document.querySelector('.resend-link');
            resendLink.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            resendLink.style.pointerEvents = 'none';
            
            try {
                // Wait for Firebase to be ready
                await waitForFirebase();
                
                if (typeof firebase === 'undefined') {
                    throw new Error('Firebase not loaded. Please refresh the page and try again.');
                }
                
                // Get current user
                const user = firebase.auth().currentUser;
                if (!user) {
                    throw new Error('No user found. Please sign up again.');
                }
                
                // Get phone number from localStorage
                const phoneNumber = localStorage.getItem('signupPhone');
                const userName = localStorage.getItem('signupName');
                
                if (!phoneNumber) {
                    throw new Error('Phone number not found. Please sign up again.');
                }
                
                console.log('Resending SMS OTP to:', phoneNumber);
                
                // Call the SMS OTP function from signup.js
                if (typeof sendSMSOTP === 'function') {
                    await sendSMSOTP(phoneNumber, userName);
                    alert('Verification code sent! Please check your phone.');
                } else {
                    // Fallback: generate new OTP locally
                    const otp = Math.floor(100000 + Math.random() * 900000).toString();
                    localStorage.setItem('smsOTP', otp);
                    localStorage.setItem('smsOTPExpiry', Date.now() + (5 * 60 * 1000));
                    
                    console.log('New SMS OTP generated:', otp);
                    alert('New verification code generated! Please check your phone.');
                }
                
            } catch (error) {
                console.error('Resend SMS code error:', error);
                alert('Failed to resend code: ' + error.message);
            } finally {
                // Reset button state
                resendLink.innerHTML = 'Click to resend.';
                resendLink.style.pointerEvents = 'auto';
            }
        }
        
        // Navigation functions
        function goBack() {
            window.history.back();
        }
        
        function goToLogin() {
            window.location.href = 'html/login.html';
        }
        
        // Get phone number from URL parameters or localStorage
        function getPhoneFromSource() {
            const urlParams = new URLSearchParams(window.location.search);
            const phone = urlParams.get('phone') || localStorage.getItem('signupPhone') || '+63 912 345 6789';
            
            // Format phone number for display
            let displayPhone = phone;
            if (phone.startsWith('+63')) {
                const digits = phone.substring(3);
                if (digits.length === 10) {
                    displayPhone = `+63 ${digits.substring(0, 3)} ${digits.substring(3, 6)} ${digits.substring(6)}`;
                }
            }
            
            document.getElementById('phoneDisplay').textContent = displayPhone;
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            getPhoneFromSource();
            
            // Focus first input
            otpInputs[0].focus();
        });
        
        // Add some visual feedback
        verifyButton.addEventListener('mouseenter', function() {
            if (!this.disabled) {
                this.style.transform = 'translateY(-2px)';
            }
        });
        
        verifyButton.addEventListener('mouseleave', function() {
            this.style.transform = 'translateY(0)';
        });
    </script>
</body>
</html>

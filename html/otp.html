<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification - Viktoria's Bistro</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/otp.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Left Column - Verification Form -->
            <div class="col-md-6 left-column">
                <button class="back-button" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i>
                </button>
                
                <div class="verification-content">
                <h1 class="main-heading" id="otpHeading">Check your email</h1>
                <p class="email-text" id="otpInstruction">
                    We sent a verification code to <span class="email-address" id="contactDisplay">your@email.com</span>
                </p>
                
                <div class="otp-inputs">
                    <input type="text" class="otp-input" maxlength="1" data-index="0">
                    <input type="text" class="otp-input" maxlength="1" data-index="1">
                    <input type="text" class="otp-input" maxlength="1" data-index="2">
                    <input type="text" class="otp-input" maxlength="1" data-index="3">
                    <input type="text" class="otp-input" maxlength="1" data-index="4">
                    <input type="text" class="otp-input" maxlength="1" data-index="5">
                </div>
                    
                    <p class="resend-text">
                        Didn't get the email? <span class="resend-link" onclick="resendCode()">Click to resend.</span>
                    </p>
                    
                    
                    <button class="signup-button" id="verifyButton" onclick="verifyOTP()">
                        Verify Email
                    </button>
                    
                    <p class="login-text">
                        Already have an account? <span class="login-link" onclick="goToLogin()">Login</span>
                    </p>
                </div>
            </div>
            
            <!-- Right Column - Photo Section -->
            <div class="col-md-6 right-column">
                <div class="photo-section">
                    <div class="photo-item">
                        <img src="../src/IMG/piclogin.png" alt="Viktoria's Bistro">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Main Firebase Config -->
    <script src="../main.js"></script>
    
    <!-- SendGrid OTP Service -->
    <script src="../javascript/sendgrid-otp.js"></script>
    
    <!-- OTP Verification Functions -->
    <script src="../javascript/otp.js"></script>
    
    <!-- Signup Functions for SMS OTP -->
    
    
    <!-- Custom CSS for Email Verification -->
    <style>
        .verification-info {
            margin: 20px 0;
        }
        
        .info-box {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .info-box i {
            font-size: 2rem;
            color: #007bff;
            margin-bottom: 10px;
        }
        
        .info-box h3 {
            margin: 10px 0;
            color: #333;
        }
        
        .info-box p {
            color: #666;
            margin: 0;
        }
        
        .verification-steps {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .step {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 6px;
        }
        
        .step-number {
            background: #007bff;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }
        
        .step-text {
            color: #333;
            font-weight: 500;
        }
        
        /* Photo Section Styling */
        .photo-section {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #8B2E20 0%, #a94a3a 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-item {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-item img {
            width: 100%;
            height: 100vh;
            object-fit: cover;
            object-position: center;
        }

        .right-column {
            padding: 0 !important;
        }
        
        .otp-inputs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        
        .otp-input {
            width: 50px;
            height: 50px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            background: #fff;
            transition: all 0.3s ease;
        }
        
        .otp-input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }
        
        .otp-input.filled {
            background-color: #f0f0f0;
            border-color: #007bff;
        }
    </style>

    <!-- Custom JavaScript -->
    <script>
        // Wait for Firebase to be ready
        function waitForFirebase() {
            return new Promise((resolve) => {
                const checkFirebase = () => {
                    if (typeof firebase !== 'undefined' && firebase.apps.length > 0) {
                        console.log('Firebase is ready in OTP page');
                        resolve();
                    } else {
                        setTimeout(checkFirebase, 100);
                    }
                };
                checkFirebase();
            });
        }
        
        // Initialize Firebase when page loads
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                // Initialize Firebase
                if (typeof initializeFirebase === 'function') {
                    initializeFirebase();
                }
                
                // Wait for Firebase to be ready
                await waitForFirebase();
                
            } catch (error) {
                console.error('Firebase initialization error:', error);
            }
        });
        
        // OTP Input Handling
        const otpInputs = document.querySelectorAll('.otp-input');
        const verifyButton = document.getElementById('verifyButton');
        
        // Auto-focus and navigation between inputs
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', function(e) {
                const value = e.target.value;
                
                // Only allow numbers
                if (!/^\d$/.test(value)) {
                    e.target.value = '';
                    return;
                }
                
                // Add filled class
                if (value) {
                    e.target.classList.add('filled');
                } else {
                    e.target.classList.remove('filled');
                }
                
                // Move to next input
                if (value && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
                
                // Check if all inputs are filled
                checkOTPComplete();
            });
            
            input.addEventListener('keydown', function(e) {
                // Handle backspace
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });
            
            input.addEventListener('paste', function(e) {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text');
                const digits = pastedData.replace(/\D/g, '').slice(0, 6);
                
                digits.split('').forEach((digit, i) => {
                    if (otpInputs[i]) {
                        otpInputs[i].value = digit;
                        otpInputs[i].classList.add('filled');
                    }
                });
                
                checkOTPComplete();
            });
        });
        
        // Check if OTP is complete
        function checkOTPComplete() {
            const allFilled = Array.from(otpInputs).every(input => input.value);
            verifyButton.disabled = !allFilled;
        }
        
        // Verify Email OTP Code - Direct implementation to avoid recursion
        async function verifyOTP() {
            console.log('🔍 Starting OTP verification process...');
            const otp = Array.from(otpInputs).map(input => input.value).join('');
            console.log('OTP entered:', otp);
            
            if (otp.length !== 6) {
                alert('Please enter the complete 6-digit code');
                return;
            }
            
            // Show loading state
            verifyButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
            verifyButton.disabled = true;
            
            try {
                // Wait for Firebase to be ready
                await waitForFirebase();
                
                if (typeof firebase === 'undefined') {
                    throw new Error('Firebase not loaded. Please refresh the page and try again.');
                }
                
                const email = localStorage.getItem('signupEmail');
                if (!email) {
                    throw new Error('Email not found. Please sign up again.');
                }
                
                console.log('🔐 Verifying Email OTP for user:', email);
                
                // Debug OTP status
                const storedOTP = localStorage.getItem('emailOTP');
                const storedEmail = localStorage.getItem('emailOTPEmail');
                const storedExpiry = localStorage.getItem('emailOTPExpiry');
                
                console.log('🔍 OTP Debug Info:');
                console.log('  - Stored OTP:', storedOTP);
                console.log('  - Stored Email:', storedEmail);
                console.log('  - Stored Expiry:', storedExpiry);
                console.log('  - Current Time:', Date.now());
                console.log('  - Is Expired:', storedExpiry ? Date.now() > parseInt(storedExpiry) : 'No expiry');
                console.log('  - Email Match:', storedEmail === email);
                
                // Get OTP verification manager
                const otpVerificationManager = window.otpVerificationManager;
                if (!otpVerificationManager) {
                    throw new Error('OTP verification system not initialized. Please refresh the page.');
                }
                
                console.log('✅ OTP Verification Manager found, starting verification...');
                
                // Verify OTP directly
                const result = await otpVerificationManager.verifyOTP(email, otp);
                
                console.log('✅ OTP Verification completed:', result);
                
                // Show success message
                alert('Email verified successfully! Your account has been created and you are now logged in. Redirecting to the home page...');
                
                // Direct redirect to index.html - user is already authenticated
                console.log('🚀 Redirecting to index.html...');
                window.location.href = '/index.html';
                
            } catch (error) {
                console.error('OTP verification error:', error);
                alert('Verification failed: ' + error.message);
                
                // Reset button state
                verifyButton.innerHTML = 'Verify Email';
                verifyButton.disabled = false;
            }
        }


        
        // Resend Email OTP Code - Direct implementation to avoid recursion
        async function resendCode() {
            const resendLink = document.querySelector('.resend-link');
            resendLink.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            resendLink.style.pointerEvents = 'none';
            
            try {
                // Wait for Firebase to be ready
                await waitForFirebase();
                
                if (typeof firebase === 'undefined') {
                    throw new Error('Firebase not loaded. Please refresh the page and try again.');
                }
                
                const email = localStorage.getItem('signupEmail');
                const userName = localStorage.getItem('signupName');
                
                if (!email || !userName) {
                    throw new Error('Email or user name not found. Please sign up again.');
                }
                
                console.log('Resending Email OTP to:', email);
                
                // Get OTP verification manager
                const otpVerificationManager = window.otpVerificationManager;
                if (!otpVerificationManager) {
                    throw new Error('OTP verification system not initialized. Please refresh the page.');
                }
                
                // Resend OTP directly
                const result = await otpVerificationManager.resendOTP(email, userName);
                
                // Get the new OTP from localStorage and show it
                const newOTP = localStorage.getItem('emailOTP');
                console.log('✅ New OTP generated:', newOTP);
                
                alert(`New OTP Code: ${newOTP}\n\nUse this code to verify your email.\nExpires in 10 minutes.`);
                
            } catch (error) {
                console.error('Resend OTP error:', error);
                alert('Failed to resend code: ' + error.message);
            } finally {
                // Reset button state
                resendLink.innerHTML = 'Click to resend.';
                resendLink.style.pointerEvents = 'auto';
            }
        }
        
        // Navigation functions
        function goBack() {
            window.history.back();
        }
        
        function goToLogin() {
            window.location.href = 'login.html';
        }

        
        // Add some visual feedback
        verifyButton.addEventListener('mouseenter', function() {
            if (!this.disabled) {
                this.style.transform = 'translateY(-2px)';
            }
        });
        
        verifyButton.addEventListener('mouseleave', function() {
            this.style.transform = 'translateY(0)';
        });
        
        // Set the contact display for Email
        function setContactDisplayEmail() {
            const email = localStorage.getItem('signupEmail') || 'your@email.com';
            document.getElementById('contactDisplay').textContent = email;
        }


        // Call on page load
        document.addEventListener('DOMContentLoaded', function() {
            setContactDisplayEmail();
            otpInputs[0].focus();
        });
    </script>

</body>
</html>
